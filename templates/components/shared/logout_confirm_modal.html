<div
  class="modal fade"
  id="logoutConfirmModal"
  tabindex="-1"
  aria-labelledby="logoutConfirmModalTitle"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content portal-settings-modal">
      <div class="modal-body p-4 text-center">
        <div
          class="portal-settings-modal__icon portal-settings-modal__icon--logout mx-auto mb-3"
          aria-hidden="true"
        >
          <i class="bi bi-box-arrow-right"></i>
        </div>
        <h3 class="h5 fw-bold mb-2" id="logoutConfirmModalTitle">Log out?</h3>
        <p class="text-secondary mb-4">Are you sure you want to log out?</p>
        <div class="d-flex flex-column flex-sm-row gap-2">
          <button
            type="button"
            class="btn btn-outline-secondary w-100 fw-semibold"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-danger w-100 fw-semibold portal-logout-confirm-btn"
            id="logoutConfirmBtn"
          >
            Log out
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
