<div class="portal-notify-wrap">
  <button
    type="button"
    class="btn {{ icon_btn_class|default:'portal-icon-btn' }} position-relative portal-notify-btn"
    id="portalNotifyBtn"
    aria-label="Notifications"
    aria-expanded="false"
    aria-controls="portalNotificationPanel"
  >
    <i class="bi bi-bell" aria-hidden="true"></i>
    <span class="portal-notify-badge d-none" id="portalNotificationBadge" aria-hidden="true">0</span>
  </button>
  <div
    class="portal-notify-dropdown hidden"
    id="portalNotificationPanel"
    role="region"
    aria-label="Notifications"
  >
    <div class="portal-notify-dropdown__head">
      <h3>Notifications</h3>
      <button type="button" class="btn btn-link btn-sm p-0" id="portalMarkAllReadBtn">
        Mark all as read
      </button>
    </div>
    <div class="portal-notify-dropdown__list" id="portalNotificationList"></div>
  </div>
</div>
