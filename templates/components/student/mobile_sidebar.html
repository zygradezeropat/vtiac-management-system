<div
  class="offcanvas offcanvas-start student-offcanvas d-lg-none"
  tabindex="-1"
  id="mobileStudentSidebar"
  aria-labelledby="mobileStudentSidebarLabel"
>
  <div class="offcanvas-header border-0 pb-0">
    {% include "components/shared/vtiac_brand.html" with logo_wrap_class="student-brand-logo" logo_size=36 name_class="offcanvas-title mb-0 fw-bold" brand_id="mobileStudentSidebarLabel" %}
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column pt-2">
    <nav class="student-nav flex-column flex-grow-1" aria-label="Student navigation">
      {% for item in sidebar_menu %}
      <a
        href="{{ item.route }}"
        class="student-nav-link{% if active_menu == item.label %} is-active{% endif %}"
        data-bs-dismiss="offcanvas"
      >
        <span class="student-nav-icon"><i class="bi {{ item.icon_bi }}" aria-hidden="true"></i></span>
        <span class="student-nav-label">{{ item.label }}</span>
      </a>
      {% endfor %}
    </nav>
    <a href="{% url 'logout' %}" class="student-logout mt-3" data-logout-confirm>Logout</a>
  </div>
</div>
