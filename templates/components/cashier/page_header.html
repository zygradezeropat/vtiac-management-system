<header class="cashier-page-header{% if show_clock %} cashier-page-header--with-clock{% endif %}">
  <div>
    <h1 class="cashier-page-title">{{ page_title }}</h1>
    <p class="cashier-page-subtitle">{{ page_subtitle }}</p>
  </div>
  {% if show_clock %}
  <div class="cashier-clock text-end">
    <p id="clock-date" class="cashier-clock-date mb-0"></p>
    <p id="clock-time" class="cashier-clock-time mb-0"></p>
  </div>
  {% endif %}
</header>
