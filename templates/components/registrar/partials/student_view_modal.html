<div id="view-student-modal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content rounded-4">
      <div class="modal-header border-0 pb-0">
        <div class="min-w-0 flex-grow-1 pe-2">
          <h3 id="view-student-name" class="modal-title h4 fw-semibold mb-1 text-truncate"></h3>
          <p id="view-student-meta" class="text-muted small mb-0"></p>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div id="view-student-body" class="modal-body pt-2 pb-3"></div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
