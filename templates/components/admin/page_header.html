<header class="admin-page-header{% if show_clock %} admin-page-header--with-clock{% endif %}">
  <div class="admin-page-header__left">
    <h1 class="admin-page-title">{{ page_title }}</h1>
    {% if show_fiscal_year %}
    <div class="admin-page-meta">
      <span class="admin-fiscal-year-badge">Fiscal Year: {{ fiscal_year_label }}</span>
      <span class="admin-meta-divider" aria-hidden="true">|</span>
      <p class="admin-current-date mb-0" id="currentDate"></p>
    </div>
    {% elif page_subtitle %}
    <p class="admin-page-subtitle">{{ page_subtitle }}</p>
    {% endif %}
  </div>
  {% if show_clock %}
  <div class="admin-page-header__right text-end">
    <p class="admin-current-time mb-0" id="currentTime"></p>
    <p class="admin-timezone-label mb-0">Philippine Standard Time</p>
  </div>
  {% endif %}
</header>
