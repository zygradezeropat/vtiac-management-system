{% extends "base.html" %}
{% load static %}


{% block body %}
<div class="min-vh-100 bg-light d-flex align-items-center justify-content-center p-4">
  <div class="card border-0 shadow-sm rounded-4 w-100" style="max-width:48rem">
    <div class="card-body p-4 p-md-5">
      <p class="text-vtiac fw-bold text-uppercase small mb-2">Staff Portal</p>
      <h1 class="h2 fw-bold mb-2">{{ title }}</h1>
      <p class="text-secondary mb-4">{{ description }}</p>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <div class="card bg-success-subtle border-success-subtle h-100">
            <div class="card-body">
              <p class="text-success text-uppercase fw-bold mb-1" style="font-size:0.7rem">Signed In As</p>
              <p class="h5 fw-bold text-success-emphasis mb-0">{{ portal_display_name|default:user.email }}</p>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card bg-primary-subtle border-primary-subtle h-100">
            <div class="card-body">
              <p class="text-primary text-uppercase fw-bold mb-1" style="font-size:0.7rem">Role</p>
              <p class="h5 fw-bold text-primary-emphasis mb-0">{{ title|cut:" Dashboard" }}</p>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a href="/" class="btn btn-outline-secondary fw-bold">Back to Home</a>
        <a href="{% url 'logout' %}" class="btn btn-vtiac btn-primary fw-bold" data-logout-confirm>Logout</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
